services:
  # -------------------
  # Node (Express)
  # -------------------
  - type: web
    name: api-node
    runtime: node
    rootDir: Api-Node
    plan: free
    buildCommand: npm install
    startCommand: npm start

  # -------------------
  # Django (DRF)
  # -------------------
  - type: web
    name: api-django
    runtime: python
    rootDir: Api-Django
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Por simplicidad para demo. Puedes cambiarlo al dominio exacto de Render.
      - key: ALLOWED_HOSTS
        value: "*"

  # -------------------
  # Spring Boot (Docker)
  # -------------------
  - type: web
    name: api-springboot
    runtime: docker
    rootDir: Api-SpringBoot
    plan: free
