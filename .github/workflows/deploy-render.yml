name: Validate and Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate_node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install

  validate_django:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-Django
    env:
      SECRET_KEY: test-secret
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: Api-Django/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django check
        run: python manage.py check
      - name: Django tests
        run: python manage.py test

  validate_spring:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Api-SpringBoot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: chmod +x mvnw && ./mvnw -B test

  validate_extra:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar pipeline
        run: echo "Nuevo jobs funcionando" 
        
  validate_render:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar pipeline
        run: echo "Nuevo jobs funcionando"

  deploy:
    runs-on: ubuntu-latest
    needs: [validate_node, validate_django, validate_spring, validate_extra, validate_render]
    env:
      RENDER_DEPLOY_HOOK_NODE: ${{ secrets.RENDER_DEPLOY_HOOK_NODE }}
      RENDER_DEPLOY_HOOK_DJANGO: ${{ secrets.RENDER_DEPLOY_HOOK_DJANGO }}
      RENDER_DEPLOY_HOOK_SPRING: ${{ secrets.RENDER_DEPLOY_HOOK_SPRING }}
    steps:
      - name: Trigger Render deploy (Node)
        if: env.RENDER_DEPLOY_HOOK_NODE != ''
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_NODE"

      - name: Trigger Render deploy (Django)
        if: env.RENDER_DEPLOY_HOOK_DJANGO != ''
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_DJANGO"

      - name: Trigger Render deploy (Spring)
        if: env.RENDER_DEPLOY_HOOK_SPRING != ''
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_SPRING"
